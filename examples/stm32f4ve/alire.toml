name = "stm32f4ve"
description = "Draw on ILI9341 of STM32 F4VE"
version = "0.1.0-dev"

authors = ["Max Reznik"]
maintainers = ["Max Reznik <reznikmm@gmail.com>"]
maintainers-logins = ["reznikmm"]
licenses = "Apache-2.0 WITH LLVM-exception"
website = ""
tags = []

executables = ["stm32f4ve"]

[build-switches]
development.optimization = ["-O2"]

[[depends-on]]
sdf_fonts = "*"
gnat_arm_elf = "*"
ili9341 = "*"
aa_stm32_drivers = "*"

[[pins]]
ili9341 = { url='https://github.com/reznikmm/ili9341' }
aa_stm32_drivers = { url='https://github.com/reznikmm/aa_stm32_drivers' }
sdf_fonts = { path='../..' }

[configuration.values]
aa_stm32_drivers.aa_mcu = "stm32f4"

[build-profiles]
"sdf_fonts" = "development"
